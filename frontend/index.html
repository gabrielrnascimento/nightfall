<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple WebSocket Client</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 20px auto;
      }
      input,
      button {
        padding: 5px 10px;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Test</h1>

    <div>
      <label
        >WebSocket URL:
        <input id="wsUrl" size="40" value="ws://127.0.0.1:8080" />
      </label>
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
    </div>

    <p id="status">Status: <strong>disconnected</strong></p>

    <div>
      <input id="messageInput" size="40" placeholder="Type a message..." />
      <button id="sendBtn" disabled>Send</button>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script>
      let socket = null;

      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const wsUrlEl = document.getElementById("wsUrl");
      const connectBtn = document.getElementById("connectBtn");
      const disconnectBtn = document.getElementById("disconnectBtn");
      const messageInput = document.getElementById("messageInput");
      const sendBtn = document.getElementById("sendBtn");

      function log(message) {
        const div = document.createElement("div");
        div.textContent = message;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setStatus(text) {
        statusEl.innerHTML = "Status: <string>" + text + "</strong>";
      }

      connectBtn.onclick = function () {
        const url = wsUrlEl.value.trim();
        if (!url) return;

        socket = new WebSocket(url);

        socket.addEventListener("open", () => {
          setStatus("connected");
          log("[open] Connected to " + url);
          connectBtn.disabled = true;
          disconnectBtn.disabled = false;
          sendBtn.disabled = false;
        });

        socket.addEventListener("message", (event) => {
          log("[received] " + event.data);
        });

        socket.addEventListener("close", (event) => {
          setStatus("disconnect");
          log("[close] Code: " + event.code + ", reason: " + event.reason);
          connectBtn.disabled = false;
          disconnectBtn.disabled = true;
          sendBtn.disabled = true;
        });

        socket.addEventListener("error", (event) => {
          log("[error] See console for details");
          console.error("WebSocket error: ", error);
        });
      };

      disconnectBtn.onclick = function () {
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.close(1000, "Client disconnect");
        }
      };

      sendBtn.onclick = function () {
        const msg = messageInput.value;
        if (!msg || !socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(msg);
        log("[sent] " + msg);
        messageInput.value = "";
      };

      messageInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendBtn.click();
      });
    </script>
  </body>
</html>

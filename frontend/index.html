<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple WebSocket Client</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 20px auto;
      }
      input,
      button {
        padding: 5px 10px;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Test</h1>

    <div>
      <label
        >WebSocket URL:
        <input id="wsUrl" size="40" value="ws://127.0.0.1:8080" />
      </label>
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
    </div>

    <p id="status">Status: <strong>disconnected</strong></p>

    <div>
      <input id="nameInput" size="20" placeholder="Name" />
      <input id="roomInput" size="20" placeholder="Room" />
      <button id="joinBtn" disabled>Join</button>
      <button id="leaveBtn" disabled>Leave</button>
    </div>

    <div>
      <input id="messageInput" size="40" placeholder="Type a message..." />
      <button id="sendBtn" disabled>Send</button>
    </div>

    <h3>Log</h3>
    <div id="log"></div>

    <script src="dist/app.js"></script>
  </body>
</html>
